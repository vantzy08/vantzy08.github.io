<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Happy Birthday 🎂</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Press+Start+2P&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- =========================
       FLOATING EMOJI
  ========================== -->

  <div class="floating">

    <span style="left:5%;">🎈</span>
    <span style="left:15%;">🎂</span>
    <span style="left:30%;">💖</span>
    <span style="left:45%;">✨</span>
    <span style="left:60%;">🧸</span>
    <span style="left:75%;">🎀</span>
    <span style="left:90%;">🍰</span>

  </div>

  <!-- =========================
       MUSIC MODAL
  ========================== -->

  <div
    class="music-modal"
    id="musicModal"
  >

    <div class="music-box" id="musicBox">

  <h2 id="musicTitle">
    Play Music? 🎵
  </h2>

  <p id="musicDesc">
    biar feel nya lebih dapet hehe
  </p>

  <div
    class="music-buttons"
    id="musicButtons"
  >

    <button id="musicYes">
      YES 💖
    </button>

    <button id="musicNo">
      NO 🔇
    </button>

  </div>

</div>

  </div>

  <!-- =========================
       OPENING SCREEN
  ========================== -->

  <section
    class="opening-screen"
    id="openingScreen"
  >

    <div class="hero-text">

      <h1 class="main-title">
        HAPPY<br>
        BIRTHDAY 🎂
      </h1>

      <p class="birthday-name">
        Meyida Arwanira Arima Gunasti
      </p>

    </div>

    <button
      class="start-btn"
      id="startBtn"
    >
      OPEN GIFT 🎁
    </button>

  </section>

  <!-- =========================
       MAIN CONTENT
  ========================== -->

  <main
    class="main-content"
    id="mainContent"
  >

    <!-- HEADER -->

    <div class="birthday-header">

      <h1>
        It's Your Special Day ✨
      </h1>

      <p>
        Semoga hari kamu penuh kebahagiaan 💖
      </p>

    </div>

    <!-- =========================
         PHOTO CAROUSEL
    ========================== -->

    <div class="carousel-wrapper">

      <div class="carousel-track">

        <div class="slide">
          <img
            src="images/photo1.jpeg"
            alt="photo 1"
          >
        </div>

        <div class="slide">

        </div>

            alt="photo 3"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo4.jpeg"
            alt="photo 4"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo5.jpeg"
            alt="photo 5"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo6.jpeg"
            alt="photo 6"
          >
        </div>
        
        <div class="slide">
          <img
            src="images/photo7.jpeg"
            alt="photo 7"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo8.jpeg"
            alt="photo 8"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo9.jpeg"
            alt="photo 9"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo10.jpeg"
            alt="photo 10"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo11.jpeg"
            alt="photo 11"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo12.jpeg"
            alt="photo 12"   
          >
        </div>

        <div class="slide">
          <img
            src="images/photo13.jpeg"
            alt="photo 13"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo14.jpeg"
            alt="photo 14"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo15.jpeg"
            alt="photo 15"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo16.jpeg"
            alt="photo 16"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo17.jpeg"
            alt="photo 17"
          >
        </div>

        <div class="slide">
          <img
            src="images/photo18.jpeg"
            alt="photo 18"
          >
        </div>

      </div>

    </div>

    <!-- =========================
         MESSAGE BOX
    ========================== -->

    <div class="message-box">

      <h2
        class="message-title"
        id="messageTitle"
      ></h2>

      <div id="typewriter"></div>

    </div>

  </main>

  <!-- =========================
       AUDIO
  ========================== -->

  <audio
    id="bgMusic"
    loop
    preload="auto"
  >

    <source
      src="music/song.mp3"
      type="audio/mp3"
    >

  </audio>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script src="script.js"></script>

</body>
</html>
